## Render Blueprint — Muse DNA (single-service free tier)
## Docs: https://render.com/docs/blueprint-spec
##
## Topology:
##   - 1× free Postgres
##   - 1× free web service running backend + 4 agent processes in one
##     container (see scripts/start-all-in-one.mjs)
##
## Why one service instead of five: Render's `starter` plan is $7/mo per
## service ($35/mo total for the 5-service version). The all-in-one launcher
## fits inside one free web service — agents bind to loopback ports
## 3101-3104 and the backend uses `http://localhost:31xx/execute` to call
## them, so no public URLs are needed for the agent fleet.
##
## Trade-off: free tier sleeps after 15 min idle (~30s cold start on next
## hit). Acceptable for a hackathon demo where judges click around for
## 5-15 min in a single session. Bump to `starter` (per-service) for prod.
##
## Frontend deploys separately on Vercel (see vercel.json).

databases:
  - name: muse-postgres
    databaseName: muse
    user: muse
    plan: free
    region: oregon

services:
  - type: web
    name: muse-backend
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is auto-injected by Render. The backend reads it; agents
      # bind to fixed loopback ports inside the container.
      - key: DATABASE_URL
        fromDatabase:
          name: muse-postgres
          property: connectionString
      - key: MOCK_X402
        value: "false"
      - key: REQUIRE_X402_CHALLENGE
        value: "true"
      - key: ARC_RPC_URL
        value: https://rpc.blockdaemon.testnet.arc.network
      - key: ARC_CHAIN_ID
        value: "5042002"
      - key: ARC_EXPLORER_TX_BASE
        value: https://testnet.arcscan.app/tx
      - key: ARC_BLOCKCHAIN
        value: ARC-TESTNET
      - key: USDC_CONTRACT
        value: "0x3600000000000000000000000000000000000000"
      - key: USDC_TOKEN_ADDRESS
        value: "0x3600000000000000000000000000000000000000"
      - key: GATEWAY_API_BASE_URL
        value: https://gateway-api-testnet.circle.com/v1
      - key: X402_FACILITATOR_URL
        value: https://x402.org/facilitator
      - key: MUSE_REQUIRE_SIWE
        value: "false"
      - key: MUSE_RECOVER_INTERRUPTED_TASKS
        value: "true"
      - key: MUSE_PUBLIC_HISTORY
        value: "true"
      # Agent URLs — loopback to in-container processes. The all-in-one
      # launcher binds these on the same container's localhost.
      - key: STRATEGY_AGENT_URL
        value: http://127.0.0.1:3101/execute
      - key: FAST_SEARCH_AGENT_URL
        value: http://127.0.0.1:3102/execute
      - key: COPYWRITER_AGENT_URL
        value: http://127.0.0.1:3103/execute
      - key: IMAGE_AGENT_URL
        value: http://127.0.0.1:3104/execute
      # ── Secrets — paste these into Render Dashboard → Environment ──
      - key: GEMINI_API_KEY
        sync: false
      - key: AIMLAPI_API_KEY
        sync: false
      - key: FEATHERLESS_API_KEY
        sync: false
      - key: FIREWORKS_API_KEYS
        sync: false
      - key: MUSE_BUYER_PRIVATE_KEY
        sync: false
      - key: MUSE_ADMIN_TOKEN
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      # Agent wallet addresses — the x402 facilitator returns these as
      # the `payTo` field in 402 challenges, so each agent process can
      # only run when its own wallet is registered. Generate via
      # `scripts/create_agent_wallets.mjs` or reuse the canonical four
      # from the hackathon stress-test artifact.
      - key: STRATEGY_AGENT_WALLET
        sync: false
      - key: FAST_SEARCH_WALLET
        sync: false
      - key: COPY_AGENT_WALLET
        sync: false
      - key: IMAGE_AGENT_WALLET
        sync: false
