## Render Blueprint — Muse DNA
## Docs: https://render.com/docs/blueprint-spec
##
## Деплоит:
##   - PostgreSQL 16 (managed DB)
##   - backend (Express + Socket.io)
##   - agent-strategy, agent-fast-search, agent-copywriter, agent-image
##
## Фронтенд деплоится отдельно на Vercel (см. vercel.json).
##
## Использование:
##   1. Создай новый Blueprint на render.com → New → Blueprint
##   2. Укажи этот репозиторий
##   3. Render сам создаст все сервисы и свяжет DATABASE_URL
##   4. Добавь секреты в Environment Groups (см. ниже список)

databases:
  - name: muse-postgres
    databaseName: muse
    user: muse
    plan: free          # поменяй на "starter" ($7/mo) для продакшена
    region: oregon      # frankfurt если нужна Европа

services:

  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: muse-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: starter       # Socket.io требует persistent connection — free не подходит
    region: oregon
    healthCheckPath: /health
    # Socket.io + долгие Gemini вызовы — поднимаем таймаут
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: muse-postgres
          property: connectionString
      - key: MOCK_X402
        value: "false"
      - key: REQUIRE_X402_CHALLENGE
        value: "true"
      - key: ARC_RPC_URL
        value: https://rpc.blockdaemon.testnet.arc.network
      - key: ARC_CHAIN_ID
        value: "5042002"
      - key: ARC_EXPLORER_TX_BASE
        value: https://testnet.arcscan.app/tx
      - key: ARC_BLOCKCHAIN
        value: ARC-TESTNET
      - key: USDC_CONTRACT
        value: "0x3600000000000000000000000000000000000000"
      - key: USDC_TOKEN_ADDRESS
        value: "0x3600000000000000000000000000000000000000"
      - key: GATEWAY_API_BASE_URL
        value: https://gateway-api-testnet.circle.com/v1
      - key: X402_FACILITATOR_URL
        value: https://x402.org/facilitator
      - key: MUSE_REQUIRE_SIWE
        value: "false"
      - key: MUSE_RECOVER_INTERRUPTED_TASKS
        value: "true"
      - key: MUSE_PUBLIC_HISTORY
        value: "true"
      # Agent URLs — Render внутренние URL (без интернета, быстрее)
      - key: STRATEGY_AGENT_URL
        value: https://muse-agent-strategy.onrender.com/execute
      - key: FAST_SEARCH_AGENT_URL
        value: https://muse-agent-fast-search.onrender.com/execute
      - key: COPYWRITER_AGENT_URL
        value: https://muse-agent-copywriter.onrender.com/execute
      - key: IMAGE_AGENT_URL
        value: https://muse-agent-image.onrender.com/execute
      # ── Секреты (добавь вручную в Render Dashboard → Environment) ──
      - key: GEMINI_API_KEY
        sync: false
      - key: AIMLAPI_API_KEY
        sync: false
      - key: FEATHERLESS_API_KEY
        sync: false
      - key: CIRCLE_API_KEY
        sync: false
      - key: CIRCLE_ENTITY_SECRET
        sync: false
      - key: MUSE_BUYER_PRIVATE_KEY
        sync: false
      - key: MUSE_ADMIN_TOKEN
        sync: false
      - key: MUSE_WALLET_ENC_MASTER_KEY
        sync: false
      - key: BRAVE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false   # укажи URL твоего Vercel деплоя, например https://muse-dna.vercel.app

  # ── Agent: Strategy ────────────────────────────────────────────────────────
  - type: web
    name: muse-agent-strategy
    runtime: docker
    dockerfilePath: agents/strategy/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3101
      - key: SERVICE_NAME
        value: senior_strategy
      - key: MOCK_X402
        value: "false"
      - key: REQUIRE_X402_CHALLENGE
        value: "true"
      - key: ARC_RPC_URL
        value: https://rpc.blockdaemon.testnet.arc.network
      - key: GATEWAY_API_BASE_URL
        value: https://gateway-api-testnet.circle.com/v1
      - key: X402_FACILITATOR_URL
        value: https://x402.org/facilitator
      - key: ARC_EXPLORER_TX_BASE
        value: https://testnet.arcscan.app/tx
      - key: USDC_CONTRACT
        value: "0x3600000000000000000000000000000000000000"
      - key: MUSE_REQUIRE_SIWE
        value: "false"
      - key: GEMINI_API_KEY
        sync: false
      - key: AIMLAPI_API_KEY
        sync: false
      - key: FEATHERLESS_API_KEY
        sync: false
      - key: MUSE_ADMIN_TOKEN
        sync: false
      - key: STRATEGY_AGENT_WALLET
        sync: false   # адрес кошелька агента на Arc Testnet

  # ── Agent: Fast Search ────────────────────────────────────────────────────
  - type: web
